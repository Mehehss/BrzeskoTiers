<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>BrzeskoTiers</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0f;
color:white;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
background:#0f0f17;
border-bottom:1px solid #1f1f2e;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
}

.logo img{
width:38px;
height:38px;
border-radius:8px;
}

.ipBox{
background:#12121a;
padding:6px 12px;
border-radius:10px;
border:1px solid #2a2a40;
cursor:pointer;
}

/* SEARCH */
.search{
max-width:900px;
margin:10px auto;
padding:0 10px;
}

.search input{
width:100%;
padding:14px;
border-radius:12px;
background:#12121a;
border:1px solid #2a2a40;
color:white;
font-size:14px;
}

/* BOARD */
#leaderboard{
max-width:1000px;
margin:auto;
}

/* PLAYER (POWIĘKSZONE 🔥) */
.playerRow{
display:flex;
justify-content:space-between;
align-items:center;
padding:24px;
margin-bottom:12px;
border-radius:18px;
background:#12121a;
border:1px solid #1f1f2e;
cursor:pointer;
transition:0.2s;
}

.playerRow:hover{
transform:scale(1.04);
}

/* TOP GLOW */
.rank1{box-shadow:0 0 24px gold;}
.rank2{box-shadow:0 0 20px silver;}
.rank3{box-shadow:0 0 18px #cd7f32;}
.rank4{box-shadow:0 0 14px #5c4033;}
.rank5{box-shadow:0 0 12px #3b2a1a;}

/* RANK NUMBER */
.rankNum{
width:50px;
height:50px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
background:#1f1f2e;
font-size:18px;
}

/* TOP COLORS */
.top1 .rankNum{background:gold;color:black;}
.top2 .rankNum{background:silver;color:black;}
.top3 .rankNum{background:#cd7f32;color:black;}
.top4 .rankNum{background:#5c4033;color:white;}
.top5 .rankNum{background:#3b2a1a;color:white;}

/* LEFT */
.left{
display:flex;
align-items:center;
gap:20px;
min-width:400px;
}

/* BUST (WIĘKSZY 🔥) */
.bust{
width:100px;
height:100px;
border-radius:50%;
border:3px solid #2a2a40;
}

/* TEXT */
.name{
font-weight:bold;
font-size:24px;
}

.rankText{
font-size:18px;
opacity:0.85;
}

/* XP */
.xpWrap{
width:100%;
height:12px;
background:#1f1f2e;
border-radius:8px;
overflow:hidden;
margin-top:8px;
}

.xpFill{
height:100%;
background:linear-gradient(90deg,#22c55e,#a3ffb0);
}

/* TIERS */
.tiers{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
max-width:360px;
}

/* TIER BOX */
.tierBox{
display:flex;
flex-direction:column;
align-items:center;
gap:4px;
}

/* ICON */
.icon{
width:32px;
height:32px;
border-radius:50%;
border:2px solid #444;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.icon img{
width:80%;
height:80%;
object-fit:cover;
border-radius:50%;
}

/* BADGE */
.badge{
padding:3px 10px;
border-radius:12px;
font-size:11px;
color:gray;
font-weight:bold;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  display:none;
  justify-content:center;
  align-items:center;
}

#popup{
  z-index:1000;
}

#infoPopup{
  z-index:2000;
}
.popupContent{
background:#101018;
padding:18px;
border-radius:18px;
width:380px;
text-align:center;
border:1px solid #2a2a40;
}

/* POPUP BUST */
.popupBust{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #2a2a40;
}

/* POPUP TEXT */
.popName{margin-top:10px;font-size:20px;font-weight:bold;}
.popRank{opacity:0.8;margin-bottom:10px;}

/* SPACE FIX */
.popTiers{
margin-top:20px;
}

/* CLOSE */
.closeBtn{
margin-top:14px;
padding:10px 16px;
border-radius:14px;
background:#1a1a25;
border:1px solid #2a2a40;
color:white;
cursor:pointer;
}

.infoBtn{
  display:flex;
  align-items:center;
  gap:8px;

  background:#12121a; /* taki sam jak IP */
  padding:6px 12px;
  border-radius:10px;
  border:1px solid #2a2a40;

  cursor:pointer;
  transition:0.2s;
}

.infoBtn:hover{
  background:#1a1a25;
}

.infoBtn img{
  width:16px;
  height:16px;
}

/* INFO MENU */
#infoMenu .popupContent{
  width:420px;
}

/* TABS */
.tabs{
  display:flex;
  background:#0f0f17;
  border-radius:12px;
  padding:4px;
  margin-bottom:15px;
}

.tab{
  flex:1;
  padding:10px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  color:#aaa;
  transition:0.2s;
}

.tab.active{
  background:#1a1a25;
  color:white;
}

/* LISTA */
.infoList{
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* ITEM */
.infoItem{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px;
  border-radius:12px;
  background:#12121a;
}

.infoTextWrap{
  display:flex;
  flex-direction:column;
}

.points{
  font-size:13px;
  opacity:0.7;
  font-family:monospace; /* 🔥 KLUCZ */
}

/* IKONY */
.infoIcon{
  width:28px;
  height:28px;
}

/* TEKST */
.infoTitle{
  font-weight:bold;
}

.infoDesc{
  font-size:13px;
  opacity:0.7;
}

</style>
</head>

function openInfoMenu(){
  document.getElementById("infoMenu").style.display="flex";
  showTab("ranks");
}

function closeInfoMenu(){
  document.getElementById("infoMenu").style.display="none";
}

function setActive(tab){
  document.getElementById("tabRanks").classList.remove("active");
  document.getElementById("tabPoints").classList.remove("active");

  if(tab==="ranks"){
    document.getElementById("tabRanks").classList.add("active");
  }else{
    document.getElementById("tabPoints").classList.add("active");
  }
}

function showTab(tab){
  setActive(tab);

  let html="";

  if(tab==="ranks"){
    html = `
    <div class="infoList">

      ${rankItem("Combat GrandMaster","750+ total points")}
      ${rankItem("Combat Master","500+ total points")}
      ${rankItem("Combat Ace","300+ total points")}
      ${rankItem("Combat Specialist","200+ total points")}
      ${rankItem("Combat Gadet","100+ total points")}
      ${rankItem("Combat Novice","50+ total points")}
      ${rankItem("Rookie","25+ total points")}
      ${rankItem("Beginner","0+ total points")}

    </div>
    `;
  }

  if(tab==="points"){
    html = `
    <div class="infoList">

      ${pointItem("Tier 1","60 / 45 pkt")}
      ${pointItem("Tier 2","30 / 20 pkt")}
      ${pointItem("Tier 3","10 / 6 pkt")}
      ${pointItem("Tier 4","4 / 3 pkt")}
      ${pointItem("Tier 5","2 / 1 pkt")}

    </div>
    `;
  }

  document.getElementById("infoMenuContent").innerHTML = html;
}

function rankItem(name,desc){
  return `
  <div class="infoItem">
    <img class="infoIcon" src="${getRankIcon(name)}">
    <div class="infoTitle">${name}</div>
    <div class="points">${desc}</div>
    </div>
  </div>
  `;
}

function pointItem(name,desc){
  return `
  <div class="infoItem">
    <div class="infoTitle">${name}</div>
    <div class="infoDesc">${desc}</div>
  </div>
  `;
}

function getRankIcon(r){
  return rankIcons[r] || "";
}

/* COLORS */
const colors={
HT1:"#E8BA3A", LT1:"#D5B355",
HT2:"#C4D3E7", LT2:"#A0A7B2",
HT3:"#F89F5A", LT3:"#C67B42",
HT4:"#006400", LT4:"#6AFF00",
HT5:"#8F82A8", LT5:"#655B79",
BRAK:"#777777"
};

/* POINTS */
const pts={
HT1:60,LT1:45,
HT2:30,LT2:20,
HT3:10,LT3:6,
HT4:4,LT4:3,
HT5:2,LT5:1
};

const ip="BrzeskoFFA.aternos.me";

let db = {};

dbRef.on("value", (snap) => {
  db = snap.val() || {};
  render();
});

function gen(){
let o={};
modes.forEach(m=>{
let keys=Object.keys(pts);
o[m]=keys[Math.floor(Math.random()*keys.length)];
});
return o;
}

/* BUST */
function bust(n){
return "https://render.crafty.gg/3d/bust/"+n;
}

/* ICON */
function icon(m){
return modeIcons[m];
}

/* POINTS */
function getPoints(p){
let t=0;
for(let m in p){
t+=pts[p[m]]||0;
}
return t;
}

/* RANK */
function rank(p){
if(p>=750)return "Combat GrandMaster";
if(p>=500)return "Combat Master";
if(p>=300)return "Combat Ace";
if(p>=200)return "Combat Specialist";
if(p>=100)return "Combat Gadet";
if(p>=50)return "Combat Novice";
if(p>=25)return "Rookie";
return "Beginner";
}

/* 🔥 NOWA WYSZUKIWARKA (ENTER → POPUP) */
function handleSearch(e){
if(e.key==="Enter"){
let n=document.getElementById("search").value.trim();

if(db[n]){
openPopup(n,getPoints(db[n]));
}else{
alert("Nie znaleziono gracza");
}
}
}

/* COPY */
function copyIP(){
navigator.clipboard.writeText(ip);
alert("Skopiowano IP");
}

/* POPUP */
function openPopup(n,p){
  let data=db[n];

  document.getElementById("popup").style.display="flex";
  document.getElementById("bust").src=bust(n);
  document.getElementById("pName").innerText=n;

 document.getElementById("pRank").innerHTML=
`
<span onclick="openInfo(rankInfo('${rank(p)}'))" 
style="cursor:pointer; display:flex; align-items:center; gap:6px; justify-content:center;">
  <img src="${getRankIcon(rank(p))}" style="width:22px;height:22px;">
  ${rank(p)}
</span> ${p} pkt
`;

  document.getElementById("xpFill").style.width=
  Math.min((p/900)*100,100)+"%";

  let html="";

  for(let m of modes){
    if(!data[m]) continue;

    let t = data[m] ?? "BRAK";
    let c=colors[t];

    html+=`
    <div class="tierBox" onclick="openInfo(tierInfo('${t}'))">
      <div class="icon" style="border-color:${c}">
        <img src="${icon(m)}">
      </div>
      <div class="badge" style="background:${c}">${t}</div>
    </div>`;
  }

  // 🔥 TO MUSI BYĆ POZA FOR
  document.getElementById("popTiers").innerHTML = html;
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function openInfo(text){
  document.getElementById("infoPopup").style.display="flex";
  document.getElementById("infoText").innerHTML = text;
}

function closeInfo(){
  document.getElementById("infoPopup").style.display="none";
}

function rankInfo(r){
  const map={
    "Combat GrandMaster":"750+",
    "Combat Master":"500-749",
    "Combat Ace":"300-499",
    "Combat Specialist":"200-299",
    "Combat Gadet":"100-199",
    "Combat Novice":"50-99",
    "Rookie":"25-49",
    "Beginner":"0-24"
  };

  return `
<div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
  <img src="${getRankIcon(r)}" style="width:50px;height:50px;">
  <div style="font-weight:bold;">${r}</div>
  <div style="opacity:0.8;">${map[r]} pkt</div>
</div>
`;
}

function tierInfo(t){
  const map={
    HT1:"60 pkt",
    LT1:"45 pkt",
    HT2:"30 pkt",
    LT2:"20 pkt",
    HT3:"10 pkt",
    LT3:"6 pkt",
    HT4:"4 pkt",
    LT4:"3 pkt",
    HT5:"2 pkt",
    LT5:"1 pkt",
    BRAK:"0 pkt"
  };

  return `
<div style="text-align:center">
  <div style="font-weight:bold;font-size:18px">${t}</div>
  <div style="opacity:0.8;margin-top:5px">${map[t]}</div>
</div>
`;
}

/* RENDER */
function render(){
let box=document.getElementById("leaderboard");
box.innerHTML="";

let players=Object.keys(db)
.sort((a,b)=>getPoints(db[b])-getPoints(db[a]));

players.forEach((n,i)=>{

let p=getPoints(db[n]);

let row=document.createElement("div");
row.className="playerRow";

if(i<5)row.classList.add("rank"+(i+1));
if(i<5)row.classList.add("top"+(i+1));

row.onclick=()=>openPopup(n,p);

let tiers="";
for(let m of modes){
let t=db[n][m];
let c=colors[t];

tiers+=`
<div class="tierBox">
<div class="icon" style="border-color:${c}">
<img src="${icon(m)}">
</div>
<div class="badge" style="background:${c}">${t}</div>
</div>`;
}

row.innerHTML=`
<div class="left">
<div class="rankNum">${i+1}.</div>
<img class="bust" src="${bust(n)}">
<div>
<div class="name">${n}</div>
<div class="rankText" style="display:flex;align-items:center;gap:6px;">
  <img src="${getRankIcon(rank(p))}" style="width:18px;height:18px;">
  ${rank(p)} • ${p}
</div>
<div class="xpWrap"><div class="xpFill" style="width:${Math.min((p/900)*100,100)}%"></div></div>
</div>
</div>

<div class="tiers">${tiers}</div>
`;

box.appendChild(row);
});
}

render();

</script>

</body>
</html>
